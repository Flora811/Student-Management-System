<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head}"></head>

<body>

    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div th:replace="~{fragments/layout :: sidebar}"/>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <!-- Top Navigation -->
            <!-- NavBar fragment-->
            <div th:replace="~{fragments/layout :: navbar}"></div>

            <!-- Main Content -->
            <div class="container-fluid px-4 py-4">
                <h2 class="mb-4">Dashboard</h2>

                <!-- Stats Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card bg-primary text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-title mb-0">Total Students</h6>
                                        <h2 class="my-2" th:text="${dashboardStats.totalStudents}"></h2>
                                    </div>
                                    <i class="bi bi-people fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-success text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-title mb-0">Total Courses</h6>
                                        <h2 class="my-2" th:text="${dashboardStats.totalCourses}"></h2>
                                    </div>
                                    <i class="bi bi-book fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-info text-dark h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-title mb-0">Top Performing Courses</h6>
                                        <h2 class="my-2" th:text="${dashboardStats.topPerformingCourse}"></h2>
                                    </div>
                                    <i class="bi bi-trophy fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-secondary text-white h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="card-title mb-0">Students Enrolled This Month</h6>
                                        <h2 class="my-2" th:text="${dashboardStats.studentsEnrolledThisMonth}"></h2>
                                    </div>
                                    <i class="bi bi-person-check fs-1 opacity-50"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity Table -->
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <i class="bi bi-table me-1"></i>
                        Recent Student Registrations
                    </div>
                    <div class="card-body">
                        <div class="text-muted" th:if="${students.isEmpty()}"> No Courses to Display </div>
                        <div class="table-responsive" th:if="${!students.isEmpty()}">
                            <table class="table table-hover table-striped align-middle">
                                <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Student Name</th>
                                    <th>Email</th>
                                    <th>Courses Count</th>
                                    <th>Total Fee</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="student : ${students}">
                                    <td data-label="#" th:text="${student.formattedId}"></td>
                                    <td data-label="Student Name" th:text="${student.studentName}"></td>
                                    <td data-label="Email" th:text="${student.email}"></td>
                                    <td data-label="Courses Count" th:text="${student.courseCount}"></td>
                                    <td data-label="Total Fee"
                                        th:text="'$' + ${#numbers.formatDecimal(student.totalFees, 1, 'COMMA', 2, 'POINT')}"></td>
                                    <td data-label="Actions">
                                        <a th:href="@{/enrollments/enrollmentDetails/{id}(id=${student.studentId}, source='dashboard')}" class="btn btn-sm btn-info text-white" title="View"><i class="bi bi-eye"></i></a>
                                    </td>
                                </tr>

                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div th:replace="~{fragments/layout :: footer}"/>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <div  th:replace="~{fragments/layout :: scripts}" />
</body>

</html>
